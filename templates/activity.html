{% extends 'base.html' %}
{% block content %}
<div class="topbar"><h1>Activity Log</h1></div>
<div class="card">
  <table class="table">
    <tr><th>ID</th><th>User</th><th>Action</th><th>Entity</th><th>Entity ID</th><th>Details</th><th>Time</th></tr>
    {% for row in rows %}<tr><td>{{ row.id }}</td><td>{{ row.username }}</td><td>{{ row.action }}</td><td>{{ row.entity_type }}</td><td>{{ row.entity_id }}</td><td>{{ row.details }}</td><td>{{ row.created_at|datetimeformat }}</td></tr>{% endfor %}
  </table>
</div>
{% endblock %}
