services:
  - type: web
    name: altahhan-crm
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT app:app
    autoDeploy: true
    healthCheckPath: /login
    envVars:
      - key: CRM_DB_URL
        sync: false
      - key: TRACKING_BASE_URL
        value: https://altahhancrm.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: RENDER
        value: "true"
